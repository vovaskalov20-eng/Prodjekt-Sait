<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Shop — Магазин</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0a001f; margin: 0; font-family: 'Inter', sans-serif; color: #fff; }

    /* Навігація */
    nav { background: rgba(0,255,204,0.1); padding: 20px; text-align: center; }
    nav ul { list-style: none; display: flex; justify-content: center; gap: 40px; margin: 0; padding: 0; }
    nav a { color: #00ffcc; text-decoration: none; border: 2px solid #00ffcc; padding: 10px 20px; border-radius: 12px; transition: 0.3s; }
    nav a:hover { background: #00ffcc; color: #0a001f; box-shadow: 0 0 20px #00ffcc; }

    /* Hero */
    .shop-hero { text-align: center; padding: 40px; }
    .shop-hero h1 { font-size: 3rem; color: #00ffcc; text-shadow: 0 0 30px #00ffcc; }

    /* Товари */
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 40px; max-width: 1200px; margin: auto; }
    .product-card { background: rgba(255,255,255,0.06); border: 2px solid #00ffcc; border-radius: 16px; padding: 20px; text-align: center; transition: 0.3s; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 0 20px #00ffcc; }
    .product-card img { max-width: 100%; border-radius: 12px; margin-bottom: 15px; }
    .product-card h3 { color: #00ffcc; margin-bottom: 10px; }
    .product-card p { font-size: 1.1rem; margin-bottom: 15px; }

    /* Кнопки */
    .neon-btn { background: none; border: 2px solid #00ffcc; color: #00ffcc; padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .neon-btn:hover { background: #00ffcc; color: #0a001f; box-shadow: 0 0 20px #00ffcc; }

    /* Кошик */
    #cart { background: rgba(255,255,255,0.06); border: 2px solid #00ffcc; border-radius: 16px; padding: 20px; margin: 40px auto; max-width: 600px; }
    #cart h2 { color: #00ffcc; }
    #cart ul { list-style: none; padding: 0; }
    #cart li { margin: 10px 0; }
  </style>
</head>
<body>

  <!-- Навігація -->
  <nav>
    <ul>
      <li><a href="index.html">Головна</a></li>
      <li><a href="shop.html">Магазин</a></li>
      <li><a href="cart.html">Кошик</a></li>
      <li><a href="about.html">Про нас</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <div class="shop-hero">
    <h1>NEON SHOP</h1>
    <p>Виберіть товари та додайте їх у кошик</p>
  </div>

  <!-- Товари -->
  <section class="products">
    <div class="product-card">
      <img src="https://via.placeholder.com/300x200/00ffcc/0a001f?text=Неонова+лампа" alt="Неонова лампа">
      <h3>Неонова лампа</h3>
      <p>Ціна: 1200 грн</p>
      <button class="neon-btn" onclick="addToCart('Неонова лампа', 1200)">Додати в кошик</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300x200/00ffcc/0a001f?text=Неоновий+знак" alt="Неоновий знак">
      <h3>Неоновий знак</h3>
      <p>Ціна: 2500 грн</p>
      <button class="neon-btn" onclick="addToCart('Неоновий знак', 2500)">Додати в кошик</button>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/300x200/00ffcc/0a001f?text=Неоновий+годинник" alt="Неоновий годинник">
      <h3>Неоновий годинник</h3>
      <p>Ціна: 1800 грн</p>
      <button class="neon-btn" onclick="addToCart('Неоновий годинник', 1800)">Додати в кошик</button>
    </div>
  </section>

  <!-- Кошик -->
  <div id="cart">
    <h2>Ваш кошик</h2>
    <ul id="cart-items"></ul>
    <p id="cart-total">Загальна сума: 0 грн</p>
  </div>

  <script>
    let cart = [];

    function addToCart(product, price) {
      cart.push({ product, price });
      renderCart();
    }

    function renderCart() {
      const cartItems = document.getElementById('cart-items');
      const cartTotal = document.getElementById('cart-total');
      cartItems.innerHTML = '';
      let total = 0;
      cart.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.product} — ${item.price} грн`;
        cartItems.appendChild(li);
        total += item.price;
      });
      cartTotal.textContent = `Загальна сума: ${total} грн`;
    }
  </script>

</body>
</html>
